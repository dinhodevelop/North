services:
  postgres:
    image: postgres:16-alpine
    container_name: north_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-north}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-north123}
      POSTGRES_DB: ${POSTGRES_DB:-northdb}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-north} -d ${POSTGRES_DB:-northdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: node:20
    container_name: north_api
    restart: unless-stopped
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-north}:${POSTGRES_PASSWORD:-north123}@postgres:5432/${POSTGRES_DB:-northdb}
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      PORT: 3001
      NODE_ENV: development
    volumes:
      - ./apps/api:/app
      - api_node_modules:/app/node_modules
      - api_seed_flag:/tmp/seeds
    ports:
      - "3001:3001"
    command: >
      sh -c "
        npm install --legacy-peer-deps &&
        node_modules/.bin/prisma generate &&
        node_modules/.bin/prisma migrate deploy &&
        if [ ! -f /tmp/seeds/done ]; then
          node_modules/.bin/tsx prisma/seed.ts &&
          mkdir -p /tmp/seeds &&
          touch /tmp/seeds/done
        fi &&
        node_modules/.bin/tsx watch src/server.ts
      "

  web:
    image: node:20
    container_name: north_web
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      PORT: 3000
      WATCHPACK_POLLING: "true"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next
    ports:
      - "3000:3000"
    command: >
      sh -c "
        npm install --legacy-peer-deps &&
        npm run dev
      "

volumes:
  postgres_data_dev:
  api_node_modules:
  api_seed_flag:
  web_node_modules:
  web_next:
