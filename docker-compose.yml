services:
  postgres:
    image: postgres:16-alpine
    container_name: north_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-north}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-north123}
      POSTGRES_DB: ${POSTGRES_DB:-northdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-north}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: north_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-north}:${POSTGRES_PASSWORD:-north123}@postgres:5432/${POSTGRES_DB:-northdb}
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: north_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
